<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor !</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">
    
</head>



<body>
    
    <div class="content">
        <div class="head">
            <h1 class="header">Let's Play Rock-Paper-Scissor !</h1>
        </div>
        <div class="scors">
            <p id="human"></p>
            <p id="computer"></p>
        </div>

        <div class="cards">
            <div class="rock"><img src="images/image.png" alt="choose rock !"></div>
            <div class="paper"><img src="images/imgPaper.png" alt="choose paper !"></div>
            <div class="scissor"><img src="images/imgScissor.png" alt="choose Scissor !"></div>
        </div>
        
        <div>
            <p id="text"></p>
        </div>

        <div class="btn">
            <button id="reset">Restart</button>
        </div>
        
    </div>

    
    <script src="rock-paper.js"></script>
</body>

</html>
